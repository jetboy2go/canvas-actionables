name: PS + Canvas Scraper
on:
  schedule:
    # 7am, noon, 3pm Eastern (UTC-4 in EDT)
    - cron: '0 11 * * 1-5'   # 7:00 AM ET
    - cron: '0 16 * * 1-5'   # 12:00 PM ET
    - cron: '0 19 * * 1-5'   # 3:00 PM ET
  workflow_dispatch:          # manual trigger button in GitHub UI
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install playwright requests google-auth google-auth-oauthlib google-api-python-client
          playwright install chromium
          playwright install-deps chromium
      - name: Run scraper
        env:
          PS_USERNAME:  ${{ secrets.PS_USERNAME }}
          PS_PASSWORD:  ${{ secrets.PS_PASSWORD }}
          CANVAS_TOKEN: ${{ secrets.CANVAS_TOKEN }}
          CANVAS_STUDENT_PASSWORD: ${{ secrets.CANVAS_STUDENT_PASSWORD }}
        run: python ps_scraper.py
      - name: Commit and push results
        run: |
          git config user.name  "canvas-bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.html completed.html data/
          git diff --staged --quiet || git commit -m "scrape $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
 
